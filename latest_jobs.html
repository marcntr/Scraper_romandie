<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Dashboard — 2026-03-13 16:50</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 14px;
  background: #0f1117;
  color: #d1d5db;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1f2e 0%, #0d1525 60%, #0a0f1a 100%);
  border-bottom: 1px solid #2a2f3e;
  padding: 28px 32px 24px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: #f0f4ff;
  letter-spacing: 0.5px;
}
.header .subtitle {
  color: #6b7280;
  font-size: 12px;
  margin-top: 4px;
}
.stats {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.stat-chip {
  background: #1e2535;
  border: 1px solid #2d3448;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  color: #9ca3af;
}
.stat-chip strong {
  color: #e2e8f0;
}

/* ── Tab bar ── */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid #2a2f3e;
  background: #12161f;
  padding: 0 32px;
}
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #6b7280;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  padding: 12px 18px;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: #9ca3af; }
.tab-btn.active {
  color: #818cf8;
  border-bottom-color: #818cf8;
}

/* ── Content area ── */
.content { padding: 24px 32px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
  background: #0f1117;
  padding: 12px 0 10px;
  margin-bottom: 10px;
  border-bottom: 1px solid #1e2535;
}
.sort-btn {
  background: #1a1f2e;
  border: 1px solid #2d3448;
  border-radius: 6px;
  color: #9ca3af;
  cursor: pointer;
  font-size: 13px;
  padding: 7px 11px;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.sort-btn:hover { color: #d1d5db; border-color: #3d4460; }
.sort-btn.active { color: #818cf8; border-color: #818cf8; }
.filter-bar input,
.filter-bar select {
  background: #1a1f2e;
  border: 1px solid #2d3448;
  border-radius: 6px;
  color: #d1d5db;
  font-size: 13px;
  padding: 7px 11px;
  outline: none;
}
.filter-bar input { flex: 1; min-width: 180px; }
.filter-bar input:focus,
.filter-bar select:focus { border-color: #818cf8; }
.filter-bar select option { background: #1a1f2e; }
.results-count {
  color: #6b7280;
  font-size: 12px;
  margin-bottom: 14px;
}

/* ── Job cards ── */
.job-card {
  background: #161b27;
  border: 1px solid #242938;
  border-radius: 10px;
  margin-bottom: 12px;
  padding: 16px 18px;
  transition: border-color 0.15s;
}
.job-card:hover { border-color: #3d4460; }
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.card-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.job-title {
  font-size: 15px;
  font-weight: 600;
  color: #e2e8f0;
  line-height: 1.4;
}
.new-badge {
  background: #14532d;
  color: #4ade80;
  border: 1px solid #166534;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  flex-shrink: 0;
  white-space: nowrap;
}
.score-badge {
  border-radius: 5px;
  font-size: 12px;
  font-weight: 700;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}
.score-green  { background: #14532d; color: #4ade80; }
.score-lime   { background: #365314; color: #a3e635; }
.score-blue   { background: #1e3a5f; color: #60a5fa; }
.score-slate  { background: #1e2535; color: #94a3b8; }
.score-orange { background: #431407; color: #fb923c; }

.open-link {
  background: #1e2535;
  border: 1px solid #3d4460;
  border-radius: 5px;
  color: #818cf8;
  font-size: 12px;
  padding: 4px 10px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s;
}
.open-link:hover { background: #2a3050; }

/* ── Card meta ── */
.card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  color: #6b7280;
  font-size: 12px;
}
.company { color: #9ca3af; font-weight: 500; }
.tag {
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  letter-spacing: 0.3px;
}
.tag-romandie { background: #3b1f5e; color: #c084fc; }
.tag-swiss    { background: #1e3a5f; color: #60a5fa; }
.posted { color: #4b5563; }

/* ── Keywords ── */
.card-keywords {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 8px;
}
.kw-label {
  border-radius: 3px;
  font-weight: 700;
  font-size: 11px;
  padding: 1px 5px;
}
.kw-plus { background: #14532d; color: #4ade80; }
.kw-minus { background: #431407; color: #fb923c; }
.kw-text { color: #9ca3af; }

/* ── Description ── */
.card-desc {
  font-size: 12px;
  color: #6b7280;
  line-height: 1.5;
}
.toggle-btn {
  background: none;
  border: none;
  color: #818cf8;
  cursor: pointer;
  font-size: 12px;
  padding: 0;
}
.toggle-btn:hover { color: #a5b4fc; }
.desc-structured {
  margin-top: 10px;
  border-top: 1px solid #1e2535;
  padding-top: 10px;
}
.desc-sec {
  margin-bottom: 10px;
}
.desc-sh {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #818cf8;
  margin-bottom: 5px;
}
.desc-sh--required {
  color: #fb923c;
}
.desc-sh--optional {
  color: #34d399;
}
.desc-para {
  color: #9ca3af;
  line-height: 1.6;
  margin: 0;
}
.desc-list {
  margin: 0;
  padding-left: 18px;
  color: #9ca3af;
  line-height: 1.6;
}
.desc-list li {
  margin-bottom: 3px;
}

/* ── Alert cards ── */
.alert-card {
  background: #161b27;
  border: 1px solid #242938;
  border-left: 3px solid #d97706;
  border-radius: 8px;
  margin-bottom: 10px;
  padding: 14px 16px;
}
.alert-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.alert-company {
  font-size: 14px;
  font-weight: 600;
  color: #e2e8f0;
}
.alert-url {
  color: #6b7280;
  font-size: 12px;
  margin-bottom: 5px;
  word-break: break-all;
}
.alert-keywords {
  color: #9ca3af;
  font-size: 12px;
}

/* ── Empty state ── */
.empty { color: #4b5563; padding: 32px 0; text-align: center; }

/* ── Companies table ── */
.co-search {
  background: #1a1f2e;
  border: 1px solid #2d3448;
  border-radius: 6px;
  color: #d1d5db;
  font-size: 13px;
  padding: 7px 11px;
  outline: none;
  width: 280px;
  margin-bottom: 16px;
}
.co-search:focus { border-color: #818cf8; }
.co-table {
  width: 100%;
  border-collapse: collapse;
}
.co-table th {
  color: #6b7280;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  padding: 8px 12px;
  text-align: left;
  text-transform: uppercase;
  border-bottom: 1px solid #242938;
}
.co-row {
  border-bottom: 1px solid #1a1f2e;
  transition: background 0.1s;
}
.co-row:hover { background: #161b27; }
.co-row td { padding: 10px 12px; vertical-align: middle; }
.co-name {
  color: #e2e8f0;
  font-weight: 500;
  font-size: 13px;
  white-space: nowrap;
}
.co-url {
  color: #4b5563;
  font-size: 11px;
  word-break: break-all;
  max-width: 420px;
}
.ats-badge {
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.co-count {
  color: #6b7280;
  font-size: 12px;
  margin-bottom: 12px;
}

/* ── Triage action buttons ── */
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #1e2535;
}
.action-btn {
  border: 1px solid;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  transition: opacity 0.15s;
}
.action-btn:hover { opacity: 0.8; }
.action-ignore {
  background: #1c1917;
  border-color: #57534e;
  color: #a8a29e;
}
.action-applied {
  background: #14532d;
  border-color: #166534;
  color: #4ade80;
}
.action-match {
  background: #1e2535;
  border-color: #3d4460;
  color: #818cf8;
}

/* ── Triage tabs empty state ── */
.triage-empty {
  color: #4b5563;
  padding: 32px 0;
  text-align: center;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Biopharma Job Dashboard</h1>
  <div class="subtitle">Run: 2026-03-13 16:50</div>
  <div class="stats">
    <div class="stat-chip"><strong>1</strong> matched jobs</div>
    <div class="stat-chip"><strong>0</strong> ignored</div>
    <div class="stat-chip"><strong>0</strong> applied</div>
    <div class="stat-chip"><strong>0</strong> alerts</div>
    <div class="stat-chip"><strong>0</strong> companies monitored</div>
  </div>
</div>

<div class="tab-bar">
  <button id="tab-btn-matched" class="tab-btn active" onclick="showTab(this,'matched')">Matched Jobs (1)</button>
  <button id="tab-btn-ignored" class="tab-btn" onclick="showTab(this,'ignored')">Ignored (0)</button>

  <button class="tab-btn" onclick="showTab(this,'companies')">Companies (0)</button>
</div>

<div class="content">

  <!-- ── Matched Jobs tab ── -->
  <div id="tab-matched" class="tab-panel active">
    <div class="filter-bar">
      <input type="text" id="filter-text" placeholder="Search title, company, keywords…" oninput="applyFilters()">
      <select id="filter-company" onchange="applyFilters()">
        <option value="">All companies</option>
        <option value="Co">Co</option>
      </select>
      <select id="filter-score" onchange="applyFilters()">
        <option value="">Any score</option>
        <option value="6">Score ≥ 6</option>
        <option value="3">Score ≥ 3</option>
        <option value="1">Score ≥ 1</option>
        <option value="0">Score ≥ 0</option>
      </select>
      <select id="filter-location" onchange="applyFilters()">
        <option value="">All locations</option>
        <option value="romandie">Romandie</option>
        <option value="switzerland">Switzerland</option>
      </select>
      <button class="sort-btn active" id="sort-date-btn" onclick="setSort('date')">Date ↓</button>
      <button class="sort-btn" id="sort-score-btn" onclick="setSort('score')">Score ↓</button>
    </div>
    <div class="results-count" id="results-count">1 job shown</div>
    <div id="job-list">
      
<div class="job-card"

  <div class="card-header">

      <span class="score-badge score-slate">0</span>

  </div>

  </div>
  <div class="card-keywords">

    &nbsp;&nbsp;
    <span class="kw-label kw-minus">−</span><span class="kw-text">(none)</span>
  </div>
  <div class="card-desc">

  <!-- ── Ignored tab ── -->
  <div id="tab-ignored" class="tab-panel">

    </div>

  <!-- ── Alerts tab (only rendered when there are alerts) ── -->
  

  <!-- ── Companies tab ── -->

      <input class="co-search" type="text" id="co-search" placeholder="Filter companies…" oninput="filterCompanies()" style="margin-bottom:0">
      <select class="co-search" id="co-type-filter" onchange="filterCompanies()" style="margin-bottom:0;width:auto">
        <option value="">All types</option>
        <option value="big pharma">Big Pharma</option>

<script>
// ── Tab switching ──
function showTab(btn, name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Triage: update tab counters ──
function updateTabCounts() {
  const nM = document.querySelectorAll('#job-list .job-card').length;
  const nI = document.querySelectorAll('#ignored-list .job-card').length;
  const nA = document.querySelectorAll('#applied-list .job-card').length;
  document.getElementById('tab-btn-matched').textContent = 'Matched Jobs (' + nM + ')';
  document.getElementById('tab-btn-ignored').textContent = 'Ignored (' + nI + ')';
  document.getElementById('tab-btn-applied').textContent = 'Applied (' + nA + ')';
  document.getElementById('results-count').textContent =
    nM + ' job' + (nM === 1 ? '' : 's') + ' shown';
}

// ── Triage: rebuild action buttons after a status change ──
function renderTriageBtns(card, status) {
  card.dataset.status = status;
  const div = card.querySelector('.card-actions');
  if (status === 'matched') {
    div.innerHTML =
      '<button class="action-btn action-ignore" onclick="setJobStatus(this,\'ignored\')">Ignore</button>' +
      '<button class="action-btn action-applied" onclick="setJobStatus(this,\'applied\')">&#10003; Applied</button>';
  } else {
    div.innerHTML =
      '<button class="action-btn action-match" onclick="setJobStatus(this,\'matched\')">&#8629; Back to Matched</button>';
  }
}

// ── Triage: call API then move card ──
async function setJobStatus(btn, newStatus) {
  const card = btn.closest('.job-card');
  const url  = card.dataset.url;
  try {
    const resp = await fetch('/api/status', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({url, status: newStatus}),
    });
    if (!resp.ok) throw new Error('Server returned ' + resp.status);
  } catch(e) {
    alert('Status update failed — is server.py running?
(' + e.message + ')');
    return;
  }
  const listId = newStatus === 'matched'  ? 'job-list'
               : newStatus === 'ignored'  ? 'ignored-list'
               :                            'applied-list';
  document.getElementById(listId).prepend(card);
  renderTriageBtns(card, newStatus);
  updateTabCounts();
}

// ── Description toggle ──
function toggleDesc(btn, id) {
  const div = document.getElementById('desc-more-' + id);
  if (div.hidden) {
    div.hidden = false;
    btn.textContent = '▾ Description';
  } else {
    div.hidden = true;
    btn.textContent = '▸ Description';
  }
}

// ── Companies filter ──
function filterCompanies() {
  const q   = document.getElementById('co-search').value.toLowerCase();
  const typ = document.getElementById('co-type-filter').value.toLowerCase();
  const rows = document.querySelectorAll('#co-tbody .co-row');
  let visible = 0;
  rows.forEach(row => {
    const nameMatch = !q   || (row.dataset.name || '').includes(q);
    const typeMatch = !typ || (row.dataset.type || '').includes(typ);
    const show = nameMatch && typeMatch;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('co-count').textContent =
    visible + ' compan' + (visible === 1 ? 'y' : 'ies') + ' monitored';
}

// ── Sort ──
let currentSort = 'date';

function setSort(s) {
  currentSort = s;
  document.getElementById('sort-date-btn').classList.toggle('active', s === 'date');
  document.getElementById('sort-score-btn').classList.toggle('active', s === 'score');
  localStorage.setItem('jd_sort', s);
  applyFilters();
}

// ── Jobs filter + sort ──
function applyFilters() {
  const text    = document.getElementById('filter-text').value.toLowerCase();
  const company = document.getElementById('filter-company').value;
  const score   = document.getElementById('filter-score').value;
  const loc     = document.getElementById('filter-location').value;

  // Persist filter state
  localStorage.setItem('jd_text',     document.getElementById('filter-text').value);
  localStorage.setItem('jd_company',  company);
  localStorage.setItem('jd_score',    score);
  localStorage.setItem('jd_location', loc);

  const list  = document.getElementById('job-list');
  const cards = Array.from(list.querySelectorAll('.job-card'));

  // Sort cards in DOM before applying visibility
  cards.sort((a, b) => {
    if (currentSort === 'score') {
      const sd = parseInt(b.dataset.score, 10) - parseInt(a.dataset.score, 10);
      if (sd !== 0) return sd;
      return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    } else {
      const dd = (b.dataset.date || '').localeCompare(a.dataset.date || '');
      if (dd !== 0) return dd;
      return parseInt(b.dataset.score, 10) - parseInt(a.dataset.score, 10);
    }
  });
  cards.forEach(card => list.appendChild(card));

  // Apply visibility filters
  let visible = 0;
  cards.forEach(card => {
    const cardText    = card.dataset.text || '';
    const cardCompany = card.dataset.company || '';
    const cardScore   = parseInt(card.dataset.score, 10);
    const cardLoc     = card.dataset.location || '';

    const matchText    = !text    || cardText.includes(text);
    const matchCompany = !company || cardCompany === company;
    const matchScore   = !score   || cardScore >= parseInt(score, 10);
    const matchLoc     = !loc     || cardLoc === loc;

    if (matchText && matchCompany && matchScore && matchLoc) {
      card.style.display = '';
      visible++;
    } else {
      card.style.display = 'none';
    }
  });

  document.getElementById('results-count').textContent =
    visible + ' job' + (visible === 1 ? '' : 's') + ' shown';
}

// ── Init: restore persisted state then render ──
(function init() {
  const txt = localStorage.getItem('jd_text');
  const co  = localStorage.getItem('jd_company');
  const sc  = localStorage.getItem('jd_score');
  const lo  = localStorage.getItem('jd_location');
  const so  = localStorage.getItem('jd_sort');
  if (txt) document.getElementById('filter-text').value = txt;
  if (co)  document.getElementById('filter-company').value = co;
  if (sc)  document.getElementById('filter-score').value = sc;
  if (lo)  document.getElementById('filter-location').value = lo;
  if (so) {
    currentSort = so;
    document.getElementById('sort-date-btn').classList.toggle('active', so === 'date');
    document.getElementById('sort-score-btn').classList.toggle('active', so === 'score');
  }
  applyFilters();
})();
