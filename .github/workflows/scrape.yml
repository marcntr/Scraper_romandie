name: Scrape Jobs

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 h — 00:00 and 12:00 UTC
  workflow_dispatch:           # manual "Run workflow" button in the Actions tab

permissions:
  contents: write              # needed to commit latest_jobs.html back to main

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # scraper takes ~10 min; kill if hung

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -u main.py

      - name: Publish dashboard to GitHub Pages
        run: |
          cp latest_jobs.html index.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_jobs.html index.html
          git diff --cached --quiet && echo "No changes — skipping commit" && exit 0
          git commit -m "chore: refresh dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
